<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <rect width="120" height="120" rx="10" fill="#1a1a1a"/>
  <!-- Pack body -->
  <rect x="30" y="28" width="60" height="72" rx="6" fill="#c0392b"/>
  <rect x="31" y="29" width="58" height="70" rx="5" fill="#e74c3c"/>
  <!-- Pack top flap -->
  <rect x="30" y="28" width="60" height="18" rx="5" fill="#c0392b"/>
  <rect x="31" y="29" width="58" height="8" rx="4" fill="#a93226"/>
  <!-- Brand label area -->
  <rect x="36" y="50" width="48" height="36" rx="3" fill="white" opacity="0.15"/>
  <text x="60" y="65" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">СИГАРЕТЫ</text>
  <text x="60" y="78" text-anchor="middle" font-family="Arial" font-size="6" fill="#ffcc00">PREMIUM</text>
  <!-- Cigarettes sticking out -->
  <rect x="42" y="22" width="5" height="14" rx="2" fill="#f5e6c8"/>
  <rect x="50" y="20" width="5" height="16" rx="2" fill="#f5e6c8"/>
  <rect x="58" y="21" width="5" height="15" rx="2" fill="#f5e6c8"/>
  <rect x="66" y="19" width="5" height="17" rx="2" fill="#f5e6c8"/>
  <rect x="74" y="22" width="5" height="14" rx="2" fill="#f5e6c8"/>
  <!-- Filter tips -->
  <rect x="42" y="30" width="5" height="5" rx="1" fill="#d4a570"/>
  <rect x="50" y="30" width="5" height="5" rx="1" fill="#d4a570"/>
  <rect x="58" y="30" width="5" height="5" rx="1" fill="#d4a570"/>
  <rect x="66" y="30" width="5" height="5" rx="1" fill="#d4a570"/>
  <rect x="74" y="30" width="5" height="5" rx="1" fill="#d4a570"/>
  <!-- Smoke -->
  <path d="M50 18 Q48 12 52 8" stroke="#aaa" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M66 17 Q70 11 67 6" stroke="#aaa" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
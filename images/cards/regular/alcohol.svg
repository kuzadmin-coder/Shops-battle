<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <rect width="120" height="120" rx="10" fill="#1a0a2e"/>
  <!-- Bottle body -->
  <rect x="46" y="38" width="28" height="52" rx="6" fill="#c8a000"/>
  <rect x="47" y="39" width="26" height="50" rx="5" fill="#e8c030"/>
  <!-- Bottle neck -->
  <rect x="52" y="24" width="16" height="16" rx="3" fill="#c8a000"/>
  <rect x="53" y="25" width="14" height="14" rx="2" fill="#d4b020"/>
  <!-- Cork/cap -->
  <rect x="51" y="18" width="18" height="8" rx="3" fill="#8b4513"/>
  <!-- Label -->
  <rect x="50" y="52" width="20" height="24" rx="3" fill="#fff" opacity="0.9"/>
  <text x="60" y="62" text-anchor="middle" font-family="Arial" font-size="6" font-weight="bold" fill="#880000">ВОДКА</text>
  <line x1="51" y1="65" x2="69" y2="65" stroke="#ccc" stroke-width="0.5"/>
  <text x="60" y="72" text-anchor="middle" font-family="Arial" font-size="4.5" fill="#333">40°</text>
  <!-- Shine -->
  <rect x="53" y="42" width="4" height="30" rx="2" fill="white" opacity="0.2"/>
  <!-- Foam/bubbles -->
  <circle cx="78" cy="55" r="5" fill="none" stroke="#e8c030" stroke-width="1" opacity="0.4"/>
  <circle cx="84" cy="48" r="3" fill="none" stroke="#e8c030" stroke-width="1" opacity="0.3"/>
  <!-- Stars -->
  <text x="25" y="40" font-size="12" opacity="0.5">⭐</text>
  <text x="80" y="80" font-size="10" opacity="0.4">⭐</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="120" height="170" viewBox="0 0 120 170">
  <rect width="120" height="170" fill="#e8f4fd" rx="14"/>
  <rect x="4" y="4" width="112" height="162" fill="none" stroke="#1565c0" stroke-width="3" rx="11"/>
  <rect x="4" y="4" width="112" height="162" fill="none" stroke="gold" stroke-width="1.5" stroke-dasharray="5,4" rx="11" opacity="0.7"/>

  <!-- надутые щёки (пыжится!) -->
  <circle cx="38" cy="72" r="14" fill="#ffd54f" opacity="0.9"/>
  <circle cx="82" cy="72" r="14" fill="#ffd54f" opacity="0.9"/>

  <!-- тело (большое, надутое) -->
  <ellipse cx="60" cy="80" rx="30" ry="26" fill="#ffd740"/>

  <!-- голова -->
  <circle cx="60" cy="50" r="20" fill="#ffd740"/>

  <!-- крылья растопырены -->
  <ellipse cx="20" cy="82" rx="14" ry="9" fill="#ffca28" transform="rotate(-25,20,82)"/>
  <ellipse cx="100" cy="82" rx="14" ry="9" fill="#ffca28" transform="rotate(25,100,82)"/>

  <!-- хохолок -->
  <path d="M55,30 Q58,16 60,12 Q62,16 65,30" fill="#ffb300" stroke="#e65100" stroke-width="1"/>

  <!-- клюв — сжатый, напряжённый -->
  <polygon points="60,56 54,62 66,62" fill="#e65100"/>

  <!-- глаза — решительные, сведённые к центру -->
  <circle cx="51" cy="46" r="6" fill="#fff"/>
  <circle cx="69" cy="46" r="6" fill="#fff"/>
  <circle cx="53" cy="46" r="3.5" fill="#1a237e"/>
  <circle cx="67" cy="46" r="3.5" fill="#1a237e"/>
  <!-- бровки нахмурены -->
  <path d="M46,40 Q51,37 56,40" fill="none" stroke="#e65100" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M64,40 Q69,37 74,40" fill="none" stroke="#e65100" stroke-width="2.5" stroke-linecap="round"/>

  <!-- лапки -->
  <line x1="50" y1="104" x2="44" y2="116" stroke="#e65100" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="70" y1="104" x2="76" y2="116" stroke="#e65100" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="116" x2="38" y2="118" stroke="#e65100" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="116" x2="44" y2="120" stroke="#e65100" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="116" x2="82" y2="118" stroke="#e65100" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="116" x2="76" y2="120" stroke="#e65100" stroke-width="2" stroke-linecap="round"/>

  <!-- пар от напряжения -->
  <path d="M94,46 Q98,40 94,34" fill="none" stroke="#90caf9" stroke-width="2" stroke-linecap="round"/>
  <path d="M100,50 Q104,44 100,38" fill="none" stroke="#90caf9" stroke-width="2" stroke-linecap="round"/>

  <text x="60" y="133" font-family="Segoe UI,Arial" font-size="12" fill="#1565c0" text-anchor="middle" font-weight="900">Пыжык</text>
  <text x="60" y="150" font-family="Segoe UI,Arial" font-size="9" fill="goldenrod" text-anchor="middle">✨ особая карта</text>
</svg>